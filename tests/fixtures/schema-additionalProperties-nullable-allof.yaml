openapi: "3.0.3"
info:
  version: 1.0.0
  title: additionalProperties nullable allOf

components:
  schemas:
    A:
      type: object
      nullable: false
      additionalProperties: false
      properties:
        a:
          type: string
      required:
        - a

paths:
  /implicit-nullable-object-allOf:
    get:
      operationId: implicit-allOf
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  # type: object - not set
                  nullable: true
                  allOf:
                    - $ref: "#/components/schemas/A"

  /explicit-nullable-object-allOf:
    get:
      operationId: explicit-allOf
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  nullable: true
                  allOf:
                    - $ref: "#/components/schemas/A"

  /explicit-object-oneOf-nullable:
    get:
      operationId: explicit-oneOf
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  oneOf:
                    - $ref: "#/components/schemas/A"
                    - nullable: true
